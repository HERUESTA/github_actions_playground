name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]' #v1.2.3のようなGitタグがプッシュされたら起動

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.ref_name }} # v1.2.3のような値をGitタグから取得
    permissions:
      contents: write # リリースノート作成に必要なパーミッション
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 # ソースコードの取得
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0 # goのセットアップ
        with:
          go-version: '1.22'
      - run: |
          go build -ldflags "-X main.version=${VERSION}" \
            -o "${RUNNER_TEMP}/example" go/example/main.go
      - run: |
          gh release create "${VERSION}" -title "${VERSION}" --generate-notes
          gh release upload "${VERSION}" "${RUNNER_TEMP}/example"
          
