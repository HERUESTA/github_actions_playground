name: Test

on: 
  pull_request: # プルリクエストが作成されたら起動
    paths: ['go/**/*.go'] # ただしGoのファイル変更時のみ
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 # ソースコードの取得
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0 # goのセットアップ
        with:
          go-version: '1.22'
      - run: go test go/excellent/*.go



